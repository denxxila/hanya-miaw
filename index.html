<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>V-Photobooth</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&family=Playfair+Display:ital,wght@0,400;0,700;1,400;1,700&family=Space+Mono&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.2/dist/confetti.browser.min.js"></script>
    <link rel="stylesheet" href="css/style.css">
<base target="_blank">
</head>
<body>
<div class="blob b1"></div>
<div class="blob b2"></div>
<div class="blob b3"></div>

<section class="step active" id="step-1">
    <div class="dots"><div class="dot a"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>
    <div class="badge"><span class="bdot"></span>EST. 2026 &middot; BY DENJI</div>
    <h1>V&#8209;Photo<em>booth</em></h1>
    <div class="div"></div>
    <div class="hfilm">
        <div class="ff" style="--ry:-12deg;--rz:-4deg;"><img src="https://i.pinimg.com/736x/60/5a/e2/605ae28f6ebcf8179fb4cf6b445fcacd.jpg" alt=""></div>
        <div class="ff" style="--ry:0deg;--rz:2deg;width:82px;height:102px;"><img src="https://i.pinimg.com/736x/60/5a/e2/605ae28f6ebcf8179fb4cf6b445fcacd.jpg" alt="" style="filter:sepia(.5) brightness(.8);"></div>
        <div class="ff" style="--ry:12deg;--rz:4deg;"><img src="https://i.pinimg.com/736x/60/5a/e2/605ae28f6ebcf8179fb4cf6b445fcacd.jpg" alt="" style="filter:grayscale(1) brightness(.7);"></div>
    </div>
    <p class="desc">Capture your best moments in a vintage-styled virtual photobooth. Pick your layout, choose your filter, and let's shoot!</p>
    <button class="btn" onclick="location.href='layout.html'"><i class="fas fa-camera" style="margin-right:7px;"></i>GET STARTED</button>
    <div class="shint"><i class="fas fa-chevron-down"></i></div>
</section>

<script src="js/common.js"></script>
<script>
    document.addEventListener('DOMContentLoaded', () => {
        resetState();
    });
</script>
</body>
</html>
